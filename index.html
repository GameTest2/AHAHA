<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenRouter Model Explorer - Thinking Visualizer</title>
    <!-- Puter.js v2 SDK -->
    <script src="https://js.puter.com/v2/"></script>
    <style>
        /* ==========================================================================
           PART 1: 思考プロセス表示に特化したマルチスプリット UI スタイル
           ========================================================================== */
        :root {
            --bg-color: #090d16;
            --card-bg: #111827;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --border: #1f2937;
            --radius: 10px;
            --danger: #ef4444;
            --thinking-bg: #1e1b4b; /* 思考エリア用の深いパープル */
            --thinking-border: #4338ca;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 25px 15px;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .select-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14.5px;
            color: var(--text-main);
            background-color: #090d16;
            transition: all 0.15s ease;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            border-radius: var(--radius);
            cursor: pointer;
            width: 100%;
            transition: background-color 0.15s ease;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:disabled {
            background-color: #1f2937;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: var(--primary);
            font-weight: 600;
            background: rgba(139, 92, 246, 0.1);
            padding: 10px;
            border-radius: var(--radius);
        }

        /* 💡 思考エリアと回答エリアを分けるグリッドコンテナ */
        .output-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 25px;
        }

        @media (min-width: 768px) {
            .output-grid {
                grid-template-columns: 1fr 1fr; /* 横並び2カラムに分割 */
            }
        }

        .output-panel {
            display: flex;
            flex-direction: column;
        }

        .panel-box {
            flex-grow: 1;
            padding: 18px;
            border-radius: var(--radius);
            min-height: 300px;
            max-height: 600px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.6;
            border: 1px solid var(--border);
            background-color: #090d16;
        }

        /* 思考プロセス専用のボックススタイル */
        #thinking-output {
            background-color: var(--thinking-bg);
            border-color: var(--thinking-border);
            color: #c084fc; /* 思考の軌跡をわかりやすく着色 */
            font-family: SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace;
            font-size: 14px;
        }

        .panel-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>

<div class="container">
    <h1>🧠 Model Explorer (Thinking Visualizer)</h1>

    <div class="form-group">
        <label for="model-search">モデルを検索 / 選択</label>
        <div class="select-container">
            <input type="text" id="model-search" placeholder="gpt, claude, deepseek, qwen...">
            <select id="model-select"></select>
        </div>
    </div>

    <div class="form-group">
        <label for="prompt">プロンプト</label>
        <textarea id="prompt" placeholder="指示を入力してください...">量子コンピュータと従来のコンピュータの違いを教えて。</textarea>
    </div>

    <button id="generate" class="btn" disabled>Puter SDKの初期化中...</button>

    <div id="loading" class="loading">思考を展開中。推論プロセスと回答を抽出しています...</div>

    <!-- 出力ビュー（左：思考プロセス / 右：最終的な回答） -->
    <div class="output-grid">
        <div class="output-panel">
            <div class="panel-title">🤔 AI Thought Process (思考の軌跡)</div>
            <div id="thinking-output" class="panel-box">ここにAIが「考えていること」が出力されます。</div>
        </div>
        <div class="output-panel">
            <div class="panel-title">✨ Final Output (最終回答)</div>
            <div id="response" class="panel-box">ここに最終的な回答が出力されます。</div>
        </div>
    </div>
</div>

    /* ==========================================================================
       PART 3: UIコントロール（要素取得、検索フィルター、グループ化ロジック）
       ========================================================================== */
    const modelSelect = document.getElementById('model-select');
    const modelSearch = document.getElementById('model-search');
    const promptInput = document.getElementById('prompt');
    const generateBtn = document.getElementById('generate');
    const responseDiv = document.getElementById('response');
    const thinkingOutput = document.getElementById('thinking-output');
    const loadingDiv = document.getElementById('loading');

    /**
     * モデルリストをフィルタリングしてセレクトボックスを再構築する関数
     * @param {string} filterText - 検索窓に入力されたキーワード
     */
    function renderModels(filterText = '') {
        modelSelect.innerHTML = '';
        const groups = {};

        rawModels.forEach(model => {
            // キーワードが含まれていない場合はスキップ
            if (filterText && !model.toLowerCase().includes(filterText.toLowerCase())) {
                return;
            }
            
            // スラッシュで区切ってプロバイダ名（組織名）を取得
            const parts = model.split('/');
            const provider = parts[0] || 'Other';
            
            if (!groups[provider]) {
                groups[provider] = [];
            }
            groups[provider].push(model);
        });

        // プロバイダ名をアルファベット順にソートして展開
        Object.keys(groups).sort().forEach(provider => {
            const optgroup = document.createElement('optgroup');
            optgroup.label = provider.toUpperCase();

            groups[provider].forEach(model => {
                const option = document.createElement('option');
                option.value = model;
                // 表示名はプロバイダ名を取り除いたすっきりした名称にする
                option.textContent = model.split('/')[1] || model;
                optgroup.appendChild(option);
            });
            modelSelect.appendChild(optgroup);
        });

        // 該当モデルがゼロ件の場合のハンドリング
        if (modelSelect.options.length === 0) {
            const option = document.createElement('option');
            option.textContent = '一致するモデルが見つかりません';
            option.disabled = true;
            modelSelect.appendChild(option);
        }
    }

    // 検索窓への入力イベントを監視（リアルタイムでリストを更新）
    modelSearch.addEventListener('input', (e) => {
        renderModels(e.target.value);
    });

    // 初期化時にすべてのモデルを読み込み
    renderModels();
    /* ==========================================================================
       PART 4: API連携・リアルタイムストリーム＆長文完全対応版
       ========================================================================== */
    
    // 生成ボタンのメインストリーミング実行関数
    async function executeGeneration() {
        const selectedModel = modelSelect.value;
        const originalPrompt = promptInput.value.trim();

        // バリデーションチェック
        if (!originalPrompt || !selectedModel || modelSelect.options?.disabled) {
            alert('有効なモデルを選択し、プロンプトを入力してください。');
            return;
        }

        if (typeof puter === 'undefined') {
            alert('Puter SDKの初期化が完了していません。一瞬待ってから再度お試しください。');
            return;
        }

        // 💡 画面表示とローディングを一度クリアして初期化
        responseDiv.textContent = '';
        thinkingOutput.textContent = '（このシンプルモードでは、右画面にリアルタイムで直接文字が降り注ぎます）';
        loadingDiv.style.display = 'block';
        generateBtn.disabled = true;

        try {
            // 💡 余計な指示文やtemperatureは一切載せず、ストリームフラグとモデル名だけで純粋にリクエスト
            const response = await puter.ai.chat(originalPrompt, { 
                model: selectedModel,
                max_tokens: 8192,
                stream: true 
            });
            
            loadingDiv.textContent = "AIから文字をリアルタイムに受信中...";

            // 💡 Puter.js公式仕様に基づき、非同期イテレータで降ってきた文字の断片をそのまま結合
            for await (const part of response) {
                if (part?.text) {
                    // 💡 受け取った文字を右側の回答画面に「リアルタイムでそのまま追加」
                    responseDiv.textContent += part.text;
                    
                    // 文字が降ってくる動きに合わせて自動で最下部へ追従スクロール
                    responseDiv.scrollTop = responseDiv.scrollHeight;
                }
            }

        } catch (error) {
            // エラーが発生した場合はPART 5へ安全に引き渡す
            if (typeof handleResponseError === 'function') {
                handleResponseError(error);
            } else {
                responseDiv.innerHTML = `<span style="color: var(--danger);">エラーが発生しました: ${error.message}</span>`;
            }
        } finally {
            // 生成完了後にローディングを消してボタンを戻す
            loadingDiv.style.display = 'none';
            loadingDiv.textContent = "思考を展開中。推論プロセスと回答を抽出しています...";
            generateBtn.disabled = false;
        }
    }

    // Puterオブジェクトのロード状態を100msごとに監視する安全初期化ガード
    const initGuard = setInterval(() => {
        if (typeof puter !== 'undefined') {
            clearInterval(initGuard); // ロード完了したら監視を停止
            
            generateBtn.disabled = false;
            generateBtn.textContent = 'リアルタイムモードで生成';
            generateBtn.addEventListener('click', executeGeneration);
            console.log("Puter Stream Engine successfully armed!");
        }
    }, 100);
    /* ==========================================================================
       PART 5: シンプルライブ出力・エラーハンドリング ＆ HTML完了
       ========================================================================== */

    /**
     * ストリーミング通信中またはAPIエラー発生時の安全なUI表示関数
     * @param {Error} error - エラーオブジェクト
     */
    function handleResponseError(error) {
        console.error("Puter AI Streaming API Error:", error);
        
        // エラーオブジェクトがObjectのままでも見やすいように文字列展開して表示
        const errMessage = error && typeof error === 'object' 
            ? (error.message || JSON.stringify(error)) 
            : (error || '不明なストリーミングエラーが発生しました。時間を置いて再度お試しください。');

        responseDiv.innerHTML = `
            <div style="color: var(--danger); font-weight: 600; display: flex; flex-direction: column; gap: 8px;">
                <span style="display: flex; align-items: center; gap: 6px;">⚠️ リアルタイム通信中にエラーが発生しました</span>
                <span style="font-size: 13px; font-weight: normal; line-height: 1.5; background: rgba(244, 63, 94, 0.08); padding: 12px; border-radius: 6px; border: 1px solid rgba(244, 63, 94, 0.2); white-space: pre-wrap; font-family: monospace;">
                    ${errMessage}
                </span>
            </div>
        `;
        thinkingOutput.textContent = "ストリームエラーのため、推論プロセスを取得できませんでした。";
    }
</script>
</body>
</html>
