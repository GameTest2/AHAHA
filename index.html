            font-size: 24px;

            margin-bottom: 24px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;

        .form-group {

        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;

            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 15px;
            color: var(--text-main);
            background-color: #090d16;

            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.25);

            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            border-radius: var(--radius);
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);

            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn:disabled {
            background-color: #1f2937;
            color: var(--text-muted);
            cursor: not-allowed;
            transform: none;

            background-color: #090d16;
            min-height: 350px;

            overflow-y: auto;

        .response-box ul, .response-box ol { margin-left: 20px; margin-bottom: 14px; }

    /* ==========================================================================
       PART 3: UIコントロール（要素取得、検索フィルター、グループ化ロジック）
       ========================================================================== */
    const modelSelect = document.getElementById('model-select');
    const modelSearch = document.getElementById('model-search');
    const promptInput = document.getElementById('prompt');
    const generateBtn = document.getElementById('generate');
    const responseDiv = document.getElementById('response');
    const loadingDiv = document.getElementById('loading');

    /**
     * モデルリストをフィルタリングしてセレクトボックスを再構築する関数
     * @param {string} filterText - 検索窓に入力されたキーワード
     */
    function renderModels(filterText = '') {
        // セレクトボックスの中身を一度完全にクリア
        modelSelect.innerHTML = '';
        const groups = {};

        rawModels.forEach(model => {
            // 💡 大文字小文字を区別せず、検索キーワードが含まれていないモデルはスキップ
            if (filterText && !model.toLowerCase().includes(filterText.toLowerCase())) {
                return;
            }
            
            // スラッシュ「/」で区切って、スラッシュの前をプロバイダ名（組織名）として取得
            const parts = model.split('/');
            const provider = parts[0] || 'Other';
            
            if (!groups[provider]) {
                groups[provider] = [];
            }
            groups[provider].push(model);
        });

        // 💡 プロバイダ名（組織名）をアルファベット順に綺麗にソートしてセレクトボックスに展開
        Object.keys(groups).sort().forEach(provider => {
            const optgroup = document.createElement('optgroup');
            optgroup.label = provider.toUpperCase(); // グループ名は大文字で見やすく表示

            groups[provider].forEach(model => {
                const option = document.createElement('option');
                option.value = model;
                // 表示名はプロバイダ名を取り除いたすっきりした名称にして視認性をアップ
                option.textContent = model.split('/')[1] || model;
                optgroup.appendChild(option);
            });
            modelSelect.appendChild(optgroup);
        });

        // 💡 検索キーワードに一致するモデルが1件もなかった場合の親切なハンドリング
        if (modelSelect.options.length === 0) {
            const option = document.createElement('option');
            option.textContent = '一致するモデルが見つかりません';
            option.disabled = true;
            modelSelect.appendChild(option);
        }
    }

    // 💡 検索窓へのテキスト入力イベントを監視し、リアルタイム（ミリ秒単位）でリストを即座に更新
    modelSearch.addEventListener('input', (e) => {
        renderModels(e.target.value);
    });

    // アプリ起動時にすべてのモデル（190種類以上）を初期読み込み
    renderModels();
    /* ==========================================================================
       PART 4: 仮想ストリーミング・エンジン ＆ コア描画制御
       ========================================================================== */
    
    // アニメーションタイマーの多重起動を防ぐための制御フラグ
    let streamAnimationId = null;

    /**
     * 一括で取得した長文テキストを、超高速で1文字ずつ滑らかに画面へ「降らせる」関数
     * 1文字増えるごとにリアルタイムにマークダウンをHTMLに変換してレンダリングします。
     * @param {string} fullText - AIから返ってきた全テキスト
     * @param {number} charDelay - 1文字あたりのミリ秒遅延（低くするほど高速）
     */
    function triggerVirtualStreaming(fullText, charDelay = 3) {
        // すでに動いている文字送りアニメーションがあれば完全に停止
        if (streamAnimationId) {
            clearInterval(streamAnimationId);
        }

        responseDiv.innerHTML = "";
        let currentIndex = 0;

        // 💡 1文字ずつ文字を結合しながらミリ秒単位でループ駆動
        streamAnimationId = setInterval(() => {
            if (currentIndex < fullText.length) {
                currentIndex++;
                const slicedText = fullText.substring(0, currentIndex);
                
                // 💡 marked.jsライブラリを使用して、1文字増えた状態のテキストをリアルタイムでHTMLに瞬時パース！
                // これにより、箇条書き、見出し、ソースコードが文字通り「リアルタイムに組み上がる」エフェクトになります。
                responseDiv.innerHTML = marked.parse(slicedText);
                
                // 文字の降下に合わせて画面を最下部へ自動追従スクロール
                responseDiv.scrollTop = responseDiv.scrollHeight;
            } else {
                // すべての文字を出し切ったらタイマーを綺麗にクリア
                clearInterval(streamAnimationId);
                streamAnimationId = null;
            }
        }, charDelay);
    }

    // 生成ボタンのメイン実行関数
    async function executeGeneration() {
        const selectedModel = modelSelect.value;
        const originalPrompt = promptInput.value.trim();

        if (!originalPrompt || !selectedModel || modelSelect.options?.disabled) {
            alert('有効なモデルを選択し、プロンプトを入力してください。');
            return;
        }

        if (typeof puter === 'undefined') {
            alert('Puter SDKの初期化が完了していません。一瞬待ってから再度お試しください。');
            return;
        }

        // UI表示の初期化とローディングの展開
        responseDiv.innerHTML = '<span style="color: var(--text-muted);">AIからの応答を待機中...</span>';
        loadingDiv.style.display = 'block';
        generateBtn.disabled = true;

        try {
            // 💡 外部アクセス制限や400エラーを防ぐため、一番クリーンな状態でリクエストを送信
            // GPT-5.4-pro等の限界長文を引き出すための最大枠（max_tokens）を最大値でしっかり確保
            const response = await puter.ai.chat(originalPrompt, { 
                model: selectedModel,
                max_tokens: 8192
            });

            // 💡 通信成功！一括で戻ってきた巨大データを、超高速ストリーミングエンジンへ引き渡す
            if (response) {
                triggerVirtualStreaming(response, 4); // 4ms間隔で爆速で1文字ずつ降らせる
            } else {
                responseDiv.innerHTML = '<span style="color: var(--text-muted);">応答が空でした。もう一度試してください。</span>';
            }

        } catch (error) {
            // エラーが発生した場合は安全にPART 5のエラーハンドラーへ委託
            if (typeof handleResponseError === 'function') {
                handleResponseError(error);
            } else {
                responseDiv.innerHTML = `<span style="color: var(--danger);">エラーが発生しました: ${error.message}</span>`;
            }
        } finally {
            // 処理完了後にローディング表示を非表示にする
            loadingDiv.style.display = 'none';
            generateBtn.disabled = false;
        }
    }

    // Puterオブジェクトがグローバルに生成されるのを監視する安全ガード（初期化イベント結合）
    const initGuard = setInterval(() => {
        if (typeof puter !== 'undefined') {
            clearInterval(initGuard);
            
            generateBtn.disabled = false;
            generateBtn.textContent = 'ストリーム生成を開始';
            generateBtn.addEventListener('click', executeGeneration);
            console.log("Puter Virtual Stream Engine enabled successfully.");
        }
    }, 100);
    /* ==========================================================================
       PART 5: エラー耐性強化・HTML完了
       ========================================================================== */

    /**
     * API通信時、またはレンダリング中にエラーが発生した際の安全なUI表示関数
     * @param {Error} error - エラーオブジェクト
     */
    function handleResponseError(error) {
        // 動いている文字送りアニメーションがあれば完全に停止してクリア
        if (streamAnimationId) {
            clearInterval(streamAnimationId);
            streamAnimationId = null;
        }

        console.error("Puter AI Engine Connection Error:", error);
        
        // エラーオブジェクトの中身をユーザー向けに見やすく展開
        const errMessage = error && typeof error === 'object' 
            ? (error.message || JSON.stringify(error)) 
            : (error || '不明なエラーが発生しました。時間を置いて再度お試しください。');

        responseDiv.innerHTML = `
            <div style="color: var(--danger); font-weight: 600; display: flex; flex-direction: column; gap: 8px;">
                <span style="display: flex; align-items: center; gap: 6px;">⚠️ 生成中にエラーが発生しました</span>
                <span style="font-size: 13.5px; font-weight: normal; line-height: 1.6; background: rgba(239, 68, 68, 0.08); padding: 14px; border-radius: 6px; border: 1px solid rgba(239, 68, 68, 0.2); white-space: pre-wrap; font-family: monospace;">
                    ${errMessage}
                </span>
            </div>
        `;
    }
</script>
</body>
</html>
