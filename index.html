<html>
  <body>
    <div style="max-width: 1000px; margin: 24px auto; font-family: Arial, sans-serif;">
      <h2 style="margin: 0 0 12px;">OpenRouter Model Explorer</h2>

      <div style="display:flex; gap:12px; align-items:flex-start; flex-wrap:wrap;">
        <div style="flex: 1 1 360px; min-width: 320px;">
          <div style="font-weight:700; margin-bottom:6px;">Model</div>

          <input
            id="modelSearch"
            type="text"
            placeholder="Search models (e.g. gpt, gemini, llama, qwen)..."
            style="width:100%; padding:10px 12px; border:1px solid #ddd; border-radius:8px; outline:none; margin-bottom:10px;"
          />

          <div style="border:1px solid #ddd; border-radius:10px; overflow:hidden;">
            <select id="modelSelect" size="10" style="width:100%; padding:10px; border:none; outline:none;"></select>
          </div>

          <div style="display:flex; gap:10px; margin-top:10px;">
            <button id="topPicks" style="padding:10px 12px;">Top picks</button>
            <button id="allModels" style="padding:10px 12px;">All</button>
          </div>

          <div id="modelCount" style="margin-top:8px; color:#666; font-size:13px;"></div>
        </div>

        <div style="flex: 1 1 520px; min-width: 320px;">
          <div style="font-weight:700; margin-bottom:6px;">Prompt</div>
          <textarea
            id="prompt"
            rows="7"
            style="width:100%; padding:12px; border:1px solid #ddd; border-radius:10px; outline:none; resize:vertical;"
          >Write a short story about a robot that discovers emotions</textarea>

          <div style="display:flex; gap:10px; align-items:center; margin-top:12px; flex-wrap:wrap;">
            <button id="generate" style="padding:12px 16px; border:none; border-radius:10px; background:#2563eb; color:white; cursor:pointer;">
              Generate (stream)
            </button>
            <div id="loading" style="display:none; color:#666;">Generating...</div>
          </div>

          <div style="margin-top:16px; border:1px solid #ddd; border-radius:12px; padding:14px; background:#fafafa;">
            <div style="font-weight:700; margin-bottom:8px;">Response</div>
            <div id="response" style="white-space:pre-wrap; min-height:120px;"></div>
          </div>
        </div>
      </div>
    </div>

        "sao10k/l3-lunaris-8b","sao10k/l3.1-70b-hanami-x1","sao10k/l3.1-euryale-70b","sao10k/l3.3-euryale-70b",

        "x-ai/grok-4.1-fast","x-ai/grok-4.20","x-ai/grok-4.20-multi-agent",
        "z-ai/glm-4.5","z-ai/glm-4.5-air","z-ai/glm-4.6","z-ai/glm-4.7","z-ai/glm-4.7-flash","z-ai/glm-5","z-ai/glm-5-turbo","z-ai/glm-5.1"

      // "Top picks"（好みで増減OK）
      const TOP_PICKS = [
        "openai/gpt-5.4-nano",
        "openai/gpt-4o-mini-2024-07-18",
        "openai/gpt-oss-120b",
        "anthropic/claude-3.5-haiku",
        "google/gemini-2.5-flash",
        "meta-llama/llama-3.1-8b-instruct",
        "qwen/qwen3-14b",
        "mistralai/mistral-small-3.2-24b-instruct",
        "deepseek/deepseek-r1"
      ];

      const elSelect = document.getElementById("modelSelect");
      const elSearch = document.getElementById("modelSearch");
      const elCount = document.getElementById("modelCount");
      const elLoading = document.getElementById("loading");
      const elResponse = document.getElementById("response");
      const elPrompt = document.getElementById("prompt");

      let baseList = MODELS.slice();

      function normalize(s){ return (s || "").toLowerCase().trim(); }

      function renderList(list) {
        const prev = elSelect.value;
        elSelect.innerHTML = "";

        for (const m of list) {
          const opt = document.createElement("option");
          opt.value = m;
          opt.textContent = m;
          elSelect.appendChild(opt);
        }

        // 現在値があれば保持、なければデフォルトへ
        if (list.includes(prev)) elSelect.value = prev;
        else if (list.includes("openai/gpt-5.4-nano")) elSelect.value = "openai/gpt-5.4-nano";
        else if (list.length) elSelect.selectedIndex = 0;

        elCount.textContent = `Showing ${list.length} models`;
      }

      function applyFilter() {
        const q = normalize(elSearch.value);
        let filtered = baseList;

        if (q) {
          filtered = baseList.filter(m => normalize(m).includes(q));
        }

        renderList(filtered);
      }

      elSearch.addEventListener("input", applyFilter);

      document.getElementById("allModels").addEventListener("click", () => {
        baseList = MODELS.slice();
        applyFilter();
      });

      document.getElementById("topPicks").addEventListener("click", () => {
        baseList = TOP_PICKS.filter(x => MODELS.includes(x));
        applyFilter();
      });

      // initial
      renderList(baseList);

      async function generate() {
        const model = elSelect.value;
        const prompt = elPrompt.value;

        elResponse.textContent = "";
        elLoading.style.display = "inline";

        try {
          const response = await puter.ai.chat(prompt, { model, stream: true });
          for await (const part of response) {
            if (part?.text) elResponse.textContent += part.text;
          }
        } finally {
          elLoading.style.display = "none";
        }
      }

      document.getElementById("generate").addEventListener("click", generate);

      // Enterで生成（textarea中のEnterは除外）
      elPrompt.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) generate();
      });
    </script>
  </body>
</html>
