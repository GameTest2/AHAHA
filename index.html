<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenRouter Model Explorer - Thinking Visualizer</title>
    <!-- Puter.js v2 SDK -->
    <script src="https://js.puter.com/v2/"></script>
    <style>
        /* ==========================================================================
           PART 1: 思考プロセス表示に特化したマルチスプリット UI スタイル
           ========================================================================== */
        :root {
            --bg-color: #090d16;
            --card-bg: #111827;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --border: #1f2937;
            --radius: 10px;
            --danger: #ef4444;
            --thinking-bg: #1e1b4b; /* 思考エリア用の深いパープル */
            --thinking-border: #4338ca;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 25px 15px;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.7);
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .select-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14.5px;
            color: var(--text-main);
            background-color: #090d16;
            transition: all 0.15s ease;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            border-radius: var(--radius);
            cursor: pointer;
            width: 100%;
            transition: background-color 0.15s ease;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:disabled {
            background-color: #1f2937;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: var(--primary);
            font-weight: 600;
            background: rgba(139, 92, 246, 0.1);
            padding: 10px;
            border-radius: var(--radius);
        }

        /* 💡 思考エリアと回答エリアを分けるグリッドコンテナ */
        .output-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 25px;
        }

        @media (min-width: 768px) {
            .output-grid {
                grid-template-columns: 1fr 1fr; /* 横並び2カラムに分割 */
            }
        }

        .output-panel {
            display: flex;
            flex-direction: column;
        }

        .panel-box {
            flex-grow: 1;
            padding: 18px;
            border-radius: var(--radius);
            min-height: 300px;
            max-height: 600px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 15px;
            line-height: 1.6;
            border: 1px solid var(--border);
            background-color: #090d16;
        }

        /* 思考プロセス専用のボックススタイル */
        #thinking-output {
            background-color: var(--thinking-bg);
            border-color: var(--thinking-border);
            color: #c084fc; /* 思考の軌跡をわかりやすく着色 */
            font-family: SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace;
            font-size: 14px;
        }

        .panel-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>

<div class="container">
    <h1>🧠 Model Explorer (Thinking Visualizer)</h1>

    <div class="form-group">
        <label for="model-search">モデルを検索 / 選択</label>
        <div class="select-container">
            <input type="text" id="model-search" placeholder="gpt, claude, deepseek, qwen...">
            <select id="model-select"></select>
        </div>
    </div>

    <div class="form-group">
        <label for="prompt">プロンプト</label>
        <textarea id="prompt" placeholder="指示を入力してください...">量子コンピュータと従来のコンピュータの違いを教えて。</textarea>
    </div>

    <button id="generate" class="btn" disabled>Puter SDKの初期化中...</button>

    <div id="loading" class="loading">思考を展開中。推論プロセスと回答を抽出しています...</div>

    <!-- 出力ビュー（左：思考プロセス / 右：最終的な回答） -->
    <div class="output-grid">
        <div class="output-panel">
            <div class="panel-title">🤔 AI Thought Process (思考の軌跡)</div>
            <div id="thinking-output" class="panel-box">ここにAIが「考えていること」が出力されます。</div>
        </div>
        <div class="output-panel">
            <div class="panel-title">✨ Final Output (最終回答)</div>
            <div id="response" class="panel-box">ここに最終的な回答が出力されます。</div>
        </div>
    </div>
</div>

    /* ==========================================================================
       PART 3: UIコントロール（要素取得、検索フィルター、グループ化ロジック）
       ========================================================================== */
    const modelSelect = document.getElementById('model-select');
    const modelSearch = document.getElementById('model-search');
    const promptInput = document.getElementById('prompt');
    const generateBtn = document.getElementById('generate');
    const responseDiv = document.getElementById('response');
    const thinkingOutput = document.getElementById('thinking-output');
    const loadingDiv = document.getElementById('loading');

    /**
     * モデルリストをフィルタリングしてセレクトボックスを再構築する関数
     * @param {string} filterText - 検索窓に入力されたキーワード
     */
    function renderModels(filterText = '') {
        modelSelect.innerHTML = '';
        const groups = {};

        rawModels.forEach(model => {
            // キーワードが含まれていない場合はスキップ
            if (filterText && !model.toLowerCase().includes(filterText.toLowerCase())) {
                return;
            }
            
            // スラッシュで区切ってプロバイダ名（組織名）を取得
            const parts = model.split('/');
            const provider = parts[0] || 'Other';
            
            if (!groups[provider]) {
                groups[provider] = [];
            }
            groups[provider].push(model);
        });

        // プロバイダ名をアルファベット順にソートして展開
        Object.keys(groups).sort().forEach(provider => {
            const optgroup = document.createElement('optgroup');
            optgroup.label = provider.toUpperCase();

            groups[provider].forEach(model => {
                const option = document.createElement('option');
                option.value = model;
                // 表示名はプロバイダ名を取り除いたすっきりした名称にする
                option.textContent = model.split('/')[1] || model;
                optgroup.appendChild(option);
            });
            modelSelect.appendChild(optgroup);
        });

        // 該当モデルがゼロ件の場合のハンドリング
        if (modelSelect.options.length === 0) {
            const option = document.createElement('option');
            option.textContent = '一致するモデルが見つかりません';
            option.disabled = true;
            modelSelect.appendChild(option);
        }
    }

    // 検索窓への入力イベントを監視（リアルタイムでリストを更新）
    modelSearch.addEventListener('input', (e) => {
        renderModels(e.target.value);
    });

    // 初期化時にすべてのモデルを読み込み
    renderModels();
    /* ==========================================================================
       PART 4: API連携・リアルタイムストリーミング制御（完全リアルタイム版）
       ========================================================================== */
    
    // 生成ボタンのメインストリーミング実行関数
    async function executeGeneration() {
        const selectedModel = modelSelect.value;
        const originalPrompt = promptInput.value.trim();

        if (!originalPrompt || !selectedModel || modelSelect.options?.disabled) {
            alert('有効なモデルを選択し、プロンプトを入力してください。');
            return;
        }

        if (typeof puter === 'undefined') {
            alert('Puter SDKの初期化が完了していません。もう一度お試しください。');
            return;
        }

        // 💡 AIに思考タグを強制しつつ、無駄な考えすぎループを防止する的確なインジェクション
        const finalPrompt = `${originalPrompt}\n\n[思考出力要求: 回答を生成する前に、あなたが考えている推論展開を必ず <thinking> と </thinking> のタグで囲んで出力してください。同じ思考のループ（考えすぎ）は厳禁とし、簡潔かつ深く思考をまとめた後、最終回答へシームレスに繋げてください。]`;

        // UI表示の初期化
        responseDiv.textContent = '';
        thinkingOutput.textContent = '';
        loadingDiv.style.display = 'block';
        generateBtn.disabled = true;

        // ストリーミングデータをリアルタイムに結合・パースするためのバッファ変数
        let accumulatedText = "";

        try {
            // 💡 stream: true を指定してリアルタイムストリーミングを有効化
            const response = await puter.ai.chat(finalPrompt, { 
                model: selectedModel,
                max_tokens: 8192,
                stream: true 
            });
            
            // ローディング表記を「受信中」に切り替え
            loadingDiv.textContent = "AIが思考・回答をリアルタイムに出力しています...";

            // 💡 非同期イテレータを使用して、APIから降ってきた文字の断片（chunk）を即座に処理
            for await (const part of response) {
                if (part?.text) {
                    accumulatedText += part.text;

                    // 💡 文字が1文字降ってくるたびに、リアルタイムで仕分けパース関数（PART 5）を叩く
                    if (typeof handleLiveParsing === 'function') {
                        handleLiveParsing(accumulatedText);
                    } else {
                        responseDiv.textContent = accumulatedText;
                    }
                }
            }

        } catch (error) {
            if (typeof handleResponseError === 'function') {
                handleResponseError(error);
            } else {
                responseDiv.innerHTML = `<span style="color: var(--danger);">エラー: ${error.message}</span>`;
            }
        } finally {
            loadingDiv.style.display = 'none';
            loadingDiv.textContent = "思考を展開中。推論プロセスと回答を抽出しています...";
            generateBtn.disabled = false;
        }
    }

    // 初期化監視安全ガード
    const initGuard = setInterval(() => {
        if (typeof puter !== 'undefined') {
            clearInterval(initGuard);
            generateBtn.disabled = false;
            generateBtn.textContent = '思考を可視化して生成';
            generateBtn.addEventListener('click', executeGeneration);
            console.log("Puter Stream Engine successfully armed!");
        }
    }, 100);
    /* ==========================================================================
       PART 5: ライブストリーム・スプリットパース ＆ HTML完了
       ========================================================================== */

    /**
     * リアルタイムに蓄積される文字列をミリ秒単位でパースし、
     * 思考中/回答中を自動判別して各画面に直接文字を流し込む関数
     * @param {string} currentBuffer - 現在までに蓄積された全文字列
     */
    function handleLiveParsing(currentBuffer) {
        // <thinking>タグが開かれているか、および閉じられているかを検出
        const openTag = "<thinking>";
        const closeTag = "</thinking>";

        const openIndex = currentBuffer.indexOf(openTag);
        const closeIndex = currentBuffer.indexOf(closeTag);

        let thinkingText = "";
        let finalText = "";

        if (openIndex !== -1) {
            // <thinking> タグが存在する場合
            if (closeIndex !== -1) {
                // 1. 既に思考タグが閉じている場合：タグの中身を抽出し、それ以降を最終回答にする
                thinkingText = currentBuffer.substring(openIndex + openTag.length, closeIndex).trim();
                finalText = currentBuffer.substring(closeIndex + closeTag.length).trim();
            } else {
                // 2. まさに今思考タグの内部を生成中（思考中）の場合：開いたタグ以降の文字をすべて思考エリアへ
                thinkingText = currentBuffer.substring(openIndex + openTag.length);
                finalText = "（思考完了後に、こちらへ最終回答がリアルタイムで出力されます）";
            }
        } else {
            // 3. 思考タグがそもそも出力されなかった場合（直接回答が降ってきた場合）
            // ディープシークR1などの推論モデルがタグ無しで生の推論を出してきた場合の簡易フォールバック
            if (currentBuffer.toLowerCase().includes('think') && currentBuffer.split('\n\n').length > 1) {
                const parts = currentBuffer.split(/\n\n(?=[#*])/);
                thinkingText = parts[0];
                finalText = parts.slice(1).join('\n\n');
            } else {
                thinkingText = "（このモデルからは、明示的な思考プロセスタグが検出されませんでした）";
                finalText = currentBuffer;
            }
        }

        // 各専用ボックスのDOMに直接テキストを流し込む（ストリーミング生出力）
        thinkingOutput.textContent = thinkingText;
        responseDiv.textContent = finalText;

        // 💡 文字が降ってくる動きに合わせて、それぞれの画面を最下部へ自動追従スクロール！
        // これにより、ハッカーの端末のように画面が自動でせり上がる視覚効果が生まれます
        thinkingOutput.scrollTop = thinkingOutput.scrollHeight;
        responseDiv.scrollTop = responseDiv.scrollHeight;
    }

    /**
     * ストリーミング通信中またはAPIエラー発生時のUI表示
     * @param {Error} error - エラーオブジェクト
     */
    function handleResponseError(error) {
        console.error("Puter AI Streaming API Error:", error);
        
        // エラーオブジェクトを文字列に展開してユーザーに分かりやすく表示
        const errMessage = error && typeof error === 'object' 
            ? (error.message || JSON.stringify(error)) 
            : (error || '不明なストリーミングエラー、またはAPIキー/セッション切れです。');

        responseDiv.innerHTML = `
            <div style="color: var(--danger); font-weight: 600; display: flex; flex-direction: column; gap: 8px;">
                <span style="display: flex; align-items: center; gap: 6px;">⚠️ リアルタイム生成中にエラーが発生しました</span>
                <span style="font-size: 13px; font-weight: normal; line-height: 1.5; background: rgba(239, 68, 68, 0.08); padding: 12px; border-radius: 6px; border: 1px solid rgba(239, 68, 68, 0.2); white-space: pre-wrap; font-family: monospace;">
                    ${errMessage}
                </span>
            </div>
        `;
        thinkingOutput.textContent = "エラーのため推論ストリームが遮断されました。";
    }
</script>
