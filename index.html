<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenRouter Model Explorer Pro</title>
    <!-- Puter.js v2 SDK -->
    <script src="https://js.puter.com/v2/"></script>
    <style>
        /* ==========================================================================
           PART 1: コアデザインシステム & 共通スタイル
           ========================================================================== */
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --border: #e2e8f0;
            --radius: 8px;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .select-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 15px;
            color: var(--text-main);
            background-color: #fff;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: var(--radius);
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: var(--primary);
            font-weight: 500;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(79, 70, 229, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .response-box {
            margin-top: 25px;
            padding: 20px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background-color: #fafafa;
            min-height: 150px;
            white-space: pre-wrap;
            font-size: 15px;
        }

        .response-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🤖 OpenRouter Model Explorer Pro</h1>

    <div class="form-group">
        <label for="model-search">モデルを検索 / 選択</label>
        <div class="select-container">
            <input type="text" id="model-search" placeholder="モデル名を入力して絞り込み...">
            <select id="model-select">
                <!-- PART 2 & PART 3 によって動的に挿入されます -->
            </select>
        </div>
    </div>

    <div class="form-group">
        <label for="prompt">プロンプト</label>
        <textarea id="prompt" placeholder="AIへの指示を入力してください...">ソーラーパネルが発電する仕組みを、中学生にもわかるように3つのステップで簡潔に説明してください。</textarea>
    </div>

    <button id="generate" class="btn">生成する</button>

    <div id="loading" class="loading">
        <span class="loading-spinner"></span>思考中・レスポンスを生成しています...
    </div>

    <div>
        <div class="response-title">Response</div>
        <div id="response" class="response-box">ここにAIの返答が表示されます。</div>
    </div>
</div>

    /* ==========================================================================
       PART 3: UIコントロール（要素取得、検索フィルター、グループ化ロジック）
       ========================================================================== */
    const modelSelect = document.getElementById('model-select');
    const modelSearch = document.getElementById('model-search');
    const promptInput = document.getElementById('prompt');
    const generateBtn = document.getElementById('generate');
    const responseDiv = document.getElementById('response');
    const loadingDiv = document.getElementById('loading');

    /**
     * モデルリストをフィルタリングしてセレクトボックスを再構築する関数
     * @param {string} filterText - 検索窓に入力されたキーワード
     */
    function renderModels(filterText = '') {
        modelSelect.innerHTML = '';
        const groups = {};

        rawModels.forEach(model => {
            // キーワードが含まれていない場合はスキップ
            if (filterText && !model.toLowerCase().includes(filterText.toLowerCase())) {
                return;
            }
            
            // スラッシュで区切ってプロバイダ名（組織名）を取得
            const parts = model.split('/');
            const provider = parts[0] || 'Other';
            
            if (!groups[provider]) {
                groups[provider] = [];
            }
            groups[provider].push(model);
        });

        // プロバイダ名をアルファベット順にソートして展開
        Object.keys(groups).sort().forEach(provider => {
            const optgroup = document.createElement('optgroup');
            optgroup.label = provider.toUpperCase();

            groups[provider].forEach(model => {
                const option = document.createElement('option');
                option.value = model;
                // 表示名はプロバイダ名を取り除いたすっきりした名称にする
                option.textContent = model.split('/')[1] || model;
                optgroup.appendChild(option);
            });
            modelSelect.appendChild(optgroup);
        });

        // 該当モデルがゼロ件の場合のハンドリング
        if (modelSelect.options.length === 0) {
            const option = document.createElement('option');
            option.textContent = '一致するモデルが見つかりません';
            option.disabled = true;
            modelSelect.appendChild(option);
        }
    }

    // 検索窓への入力イベントを監視（リアルタイムでリストを更新）
    modelSearch.addEventListener('input', (e) => {
        renderModels(e.target.value);
    });

    // 初期化時にすべてのモデルを読み込み
    renderModels();
    /* ==========================================================================
       PART 4: API連携・ローディング・生成処理（Puter.js制御ロジック）
       ========================================================================== */
    // 生成ボタンのクリックイベントを監視
    generateBtn.addEventListener('click', async () => {
        const selectedModel = modelSelect.value;
        const prompt = promptInput.value.trim();

        // 必須入力チェック
        if (!prompt || !selectedModel || modelSelect.options[0]?.disabled) {
            alert('有効なモデルを選択し、プロンプトを入力してください。');
            return;
        }

        // 状態の初期化とローディングの表示
        responseDiv.innerHTML = '';
        loadingDiv.style.display = 'block';
        generateBtn.disabled = true;

        try {
            // Puter.js v2 SDKを使用したテキスト生成リクエスト
            const response = await puter.ai.chat(prompt, { model: selectedModel });
            
            // 正常に取得できたレスポンスをグローバルイベントまたはPART 5へ引き渡す
            if (typeof handleResponseSuccess === 'function') {
                handleResponseSuccess(response);
            } else {
                responseDiv.textContent = response;
            }
        } catch (error) {
            // エラーが発生した場合はPART 5のエラーハンドラーへ引き渡す
            if (typeof handleResponseError === 'function') {
                handleResponseError(error);
            } else {
                responseDiv.innerHTML = `<span style="color: var(--danger);">エラーが発生しました: ${error.message}</span>`;
            }
        } finally {
            // 処理完了後にローディングを非表示に戻す
            loadingDiv.style.display = 'none';
            generateBtn.disabled = false;
        }
    });
    /* ==========================================================================
       PART 5: レスポンス表示エリア・エラーハンドリング ＆ HTML完了
       ========================================================================== */
    /**
     * テキスト生成が成功した時の画面表示処理
     * @param {string} text - AIからの返答テキスト
     */
    function handleResponseSuccess(text) {
        // 安全にテキストを挿入（エスケープ不要なプレーンテキストとして扱うためtextContentを使用）
        responseDiv.textContent = text;
    }

    /**
     * エラーが発生した時の画面表示とログ処理
     * @param {Error} error - エラーオブジェクト
     */
    function handleResponseError(error) {
        // 開発者ツール確認用
        console.error("Puter AI API Error:", error);
        
        // ユーザー向けのエラー表示を生成
        responseDiv.innerHTML = `
            <div style="color: var(--danger); font-weight: 600; display: flex; flex-direction: column; gap: 4px;">
                <span>⚠️ エラーが発生しました</span>
                <span style="font-size: 13px; font-weight: normal; background: rgba(239, 68, 68, 0.05); padding: 8px; border-radius: 4px; border: 1px solid rgba(239, 68, 68, 0.2);">
                    ${error.message || '不明なエラーが発生しました。'}
                </span>
            </div>
        `;
    }
</script>
